# ============================================================
# 공통 설정 + 기본 프로필: local
#
# 프로필별 파일 (같은 디렉터리):
#   application-local.yml  — PC + 로컬 MySQL
#   application-dev.yml    — 스테이징·공용 DB 등 (환경변수 우선)
#   application-prod.yml   — 운영·Docker(Lightsail) — SPRING_DATASOURCE_* 필수
#
# 실행 예:
#   SPRING_PROFILES_ACTIVE=dev ./gradlew bootRun
#   docker compose → SPRING_PROFILES_ACTIVE=prod (.env.docker)
# ============================================================

spring:
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 12MB
  # 비밀번호 찾기 메일: 운영 시 환경변수 + spring.mail.* 설정
  # mail:
  #   host: ${MAIL_HOST}
  #   port: ${MAIL_PORT:587}
  #   ...

mybatis:
  mapper-locations: classpath:/mybatis/**/*.xml
  type-aliases-package: com.noonoo.prjtbackend
  configuration:
    map-underscore-to-camel-case: true
    # 로그 레벨은 logging.level.com.noonoo.prjtbackend 등으로 제어
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

server:
  port: 8080
  servlet:
    session:
      timeout: 24h

# OpenAPI — Swagger UI: /swagger-ui.html , Scalar: /scalar/index.html (정적)
# 운영(prod)에서는 springdoc 비활성(application-prod.yml).
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    try-it-out-enabled: true
    operations-sorter: method
    tags-sorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

app:
  # 쉼표 구분 — 프론트 실제 오리진(예: http://공인IP:3001). 운영 .env.docker 의 APP_CORS_EXTRA_ORIGINS
  cors:
    extra-allowed-origins: ${APP_CORS_EXTRA_ORIGINS:}
  oauth-sync:
    secret: ${OAUTH_SYNC_SECRET:prjt-dev-oauth-sync-7f3a9b2c1d4e8e0f}
  rate-limit:
    enabled: true
    login-per-minute: 30
    password-reset-request-per-hour: 8
    password-reset-verify-per-minute: 20
    password-reset-complete-per-minute: 10
    oauth-sync-per-minute: 40
    oauth-establish-per-minute: 40
    heartbeat-per-minute: 180
  mail:
    from: ${MAIL_FROM:noreply@localhost}
  board:
    blind-report-threshold: 10
    blind-list-title: "다수의 신고로 블라인드 처리된 게시글 입니다."
    blind-comment-content: "<p>다수의 신고로 블라인드 처리된 댓글입니다.</p>"
  wallet:
    free-board-post-points: 100
  content-filter:
    mode: reject
  file:
    # 이미지 바이너리 저장소: local(기본) | s3 (S3 호환 API — AWS S3, R2, Lightsail Object Storage 등)
    storage-type: ${APP_FILE_STORAGE_TYPE:local}
    upload-dir: ${APP_FILE_UPLOAD_DIR:upload-data/files}
    public-base-url: ${APP_FILE_PUBLIC_BASE_URL:}
    s3:
      region: ${APP_FILE_S3_REGION:ap-northeast-2}
      bucket: ${APP_FILE_S3_BUCKET:}
      endpoint: ${APP_FILE_S3_ENDPOINT:}
      key-prefix: ${APP_FILE_S3_KEY_PREFIX:}
      path-style-access: ${APP_FILE_S3_PATH_STYLE_ACCESS:false}
      access-key: ${APP_FILE_S3_ACCESS_KEY:}
      secret-key: ${APP_FILE_S3_SECRET_KEY:}
    image:
      optimize-enabled: true
      preferred-raster-format: jpeg
      png-keep-alpha-as-png: true
      board:
        max-width-px: 1600
        target-min-bytes: 524288
        target-max-bytes: 1048576
      profile:
        max-edge-px: 512
        target-min-bytes: 102400
        target-max-bytes: 307200
