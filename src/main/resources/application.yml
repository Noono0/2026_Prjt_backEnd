spring:
  datasource:
    url: jdbc:mysql://localhost:3306/prjt01?serverTimezone=Asia/Seoul
    username: prjt
    password: prjt1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true
  sql:
    init:
      encoding: UTF-8
      mode: always
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  # 비밀번호 찾기 메일: 운영 시 환경변수로 설정 예)
  # MAIL_HOST, MAIL_PORT(587), MAIL_USER, MAIL_PASS, MAIL_FROM
  # 그리고 아래 spring.mail.* 주석 해제:
  # mail:
  #   host: ${MAIL_HOST}
  #   port: ${MAIL_PORT:587}
  #   username: ${MAIL_USER}
  #   password: ${MAIL_PASS}
  #   properties:
  #     mail:
  #       smtp:
  #         auth: true
  #         starttls:
  #           enable: true
mybatis:
  mapper-locations: classpath:/mybatis/**/*.xml
  type-aliases-package: com.noonoo.prjtbackend
  configuration:
    map-underscore-to-camel-case: true
server:
  port: 8080
  servlet:
    session:
      timeout: 24h

# 보안: false 로 두면 로그인 세션 + DB 역할–메뉴 권한(MEMBER_READ 등) 검사. 로컬 개발은 true 권장.
app:
  mail:
    # 발신 주소(SMTP From). MAIL_FROM 환경변수 권장
    from: ${MAIL_FROM:noreply@localhost}
    # SMTP 미구성 시 개발: 서버 로그에 인증코드 출력. 운영에서는 false + spring.mail.* 필수
    log-code-in-dev: true
  security:
    permit-all: true
  board:
    # 신고 수가 이 값 이상이면 목록 제목 치환·상세 차단·글/댓글 작성 포인트 회수(1회)
    blind-report-threshold: 10
    blind-list-title: "다수의 신고로 블라인드 처리된 게시글 입니다."
    # 자유게시판·공지 댓글/답글 목록에서 본문 치환(HTML). 댓글 블라인드 시 포인트 차감액은 free-board-post-points 와 동일.
    blind-comment-content: "<p>다수의 신고로 블라인드 처리된 댓글입니다.</p>"
  wallet:
    # 자유게시판 글 작성 시 지급 포인트(카테고리 무관). 블라인드 시 동일 금액 회수.
    free-board-post-points: 100
  # 금칙어: replace=* 치환 저장 | reject=포함 시 400(BAD_REQUEST)로 저장 거부
  content-filter:
    mode: reject
  file:
    # 업로드 파일 저장 루트 (상대 경로는 애플리케이션 작업 디렉터리 기준)
    upload-dir: upload-data/files
    # 비우면 요청 Host 기준으로 view/download URL 생성. 리버스 프록시 뒤면 http(s)://도메인 으로 지정
    public-base-url: ""

decorator:
  datasource:
    p6spy:
      enable-logging: true

logging:
  level:
    p6spy: info

