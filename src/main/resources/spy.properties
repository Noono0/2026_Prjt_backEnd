appender=com.p6spy.engine.spy.appender.Slf4JLogger
logMessageFormat=com.p6spy.engine.spy.appender.CustomLineFormat
# 주의: P6LogQuery 가 formatMessage 에 넘기는 인자에서 "effective" 자리가 원문(?), "sql" 자리가 치환본.
# 바인딩까지 붙은 문장은 %(sqlSingleLine) (또는 %(sql)). %(effectiveSql*) 는 ? 그대로 나옴.
customLogMessageFormat=[SQL %(executionTime)ms] %(sqlSingleLine)
excludecategories=info,debug,result,resultset,batch