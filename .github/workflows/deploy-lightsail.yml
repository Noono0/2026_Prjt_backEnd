# Lightsail(Ubuntu) — 저장소가 서버에 clone 되어 있고, 그 경로에서 docker compose 를 쓰는 경우
#
# 필요 GitHub Secrets (Settings → Secrets and variables → Actions):
#   LIGHTSAIL_HOST     — 공인 IP 또는 고정 도메인 (예: 13.x.x.x)
#   LIGHTSAIL_USER     — SSH 사용자 (예: ubuntu)
#   LIGHTSAIL_SSH_KEY  — 배포용 SSH 개인키 전체 (-----BEGIN ... PRIVATE KEY----- ~ END ...)
#   LIGHTSAIL_PORT     — SSH 포트 (보통 22; Lightsail 기본 SSH 와 동일하게 맞출 것)
#
# 선택 Repository variables (Settings → Secrets and variables → Actions → Variables):
#   LIGHTSAIL_DEPLOY_PATH — 기본값과 다를 때만 설정 (기본 /home/ubuntu/prjt-backend-operational)
#
# 서버 준비:
#   - 해당 경로에 이 저장소를 clone 해 두고, origin 에 push 될 브랜치와 맞는 remote/인증(Deploy key 등)
#   - .env.docker 는 서버에만 두고 Git 에 올리지 않음 (이미 README 절차)
#
name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: lightsail-deploy-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Gradle test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Test
        run: ./gradlew test --no-daemon

  deploy:
    name: SSH deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH: ${{ vars.LIGHTSAIL_DEPLOY_PATH }}
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ${{ secrets.LIGHTSAIL_USER }}
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: ${{ secrets.LIGHTSAIL_PORT }}
          envs: DEPLOY_PATH
          script_stop: true
          command_timeout: 25m
          script: |
            set -euo pipefail
            DEPLOY_DIR="${DEPLOY_PATH:-/home/ubuntu/prjt-backend-operational}"
            cd "$DEPLOY_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main
            docker compose up -d --build
            docker compose ps
